<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Articles | EEPL Classroom</title>
  <meta name="description" content="Educational articles, learning guides, and career updates from EEPL Classroom.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="articles.css">
</head>
<body class="articles-page">
  <header class="site-header" id="site-header">
    <div class="header-container">
      <a href="index.html" class="logo" id="header-logo">
        <img src="assets/eepl-reference-logo.png" alt="Emancipation Edutech Private Limited" class="header-logo-img">
      </a>
      <nav class="main-nav" id="main-nav">
        <ul class="nav-list" id="nav-list"></ul>
      </nav>
      <div class="header-actions" id="header-actions">
        <a href="/login" class="btn btn-outline-red" id="btn-login">Login</a>
        <a href="/register" class="btn btn-red" id="btn-register">Register</a>
      </div>
      <button class="hamburger" id="hamburger-btn" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="mobile-menu" id="mobile-menu">
      <ul class="mobile-nav-list" id="mobile-nav-list"></ul>
      <div class="mobile-actions">
        <a href="/login" class="btn btn-outline-red">Login</a>
        <a href="/register" class="btn btn-red">Register</a>
      </div>
    </div>
  </header>

  <main>
    <section class="articles-hero">
      <div class="container articles-hero-container">
        <div class="articles-hero-left">
          <h1>Articles</h1>
          <p class="articles-hero-sub">Stay informed with the latest insights, tips, and trends on competitive exams, and technology.</p>
        </div>
        <div class="articles-hero-right">
          <label class="search-box" for="articles-search">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 21l-4.35-4.35" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="11" cy="11" r="6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input id="articles-search" type="search" placeholder="Search articles...">
          </label>
        </div>
      </div>
    </section>

    <section class="articles-main">
      <div class="container articles-layout">
        <aside class="articles-sidebar" id="articles-sidebar"></aside>

        <section class="articles-content" aria-label="Article list">
          <div class="articles-controls">
            <div class="tabs" id="articles-tabs" role="tablist" aria-label="Article categories"></div>
            <div class="sort-select">
              <select id="sort-select" aria-label="Sort articles">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
              </select>
            </div>
          </div>

          <div class="articles-grid-cards" id="articles-grid-cards"></div>
          <div class="articles-pagination" id="articles-pagination" aria-label="Article pagination"></div>
        </section>
      </div>
    </section>

    <section class="articles-cta">
      <div class="container">
        <div class="articles-cta-inner">
          <div class="articles-cta-person articles-cta-person-left" aria-hidden="true"></div>
          <div class="articles-cta-copy">
            <h2>Ready to Get Certified?</h2>
            <p>Take the assessment and showcase your skills.</p>
            <a href="courses.html" class="articles-cta-btn">Join our courses <span aria-hidden="true">&rarr;</span></a>
          </div>
          <div class="articles-cta-person articles-cta-person-right" aria-hidden="true"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="site-footer">
    <div class="footer-container">
      <div class="footer-grid" id="footer-grid"></div>
      <div class="footer-bottom">
        <p id="footer-copyright"></p>
      </div>
    </div>
  </footer>

  <div class="articles-floating-actions" aria-label="Quick contact actions">
    <a href="https://wa.me/919835131568" target="_blank" class="articles-float-btn articles-float-wa" aria-label="Chat on WhatsApp">

  </div>

  <script src="data.js"></script>
  <script src="articles-data.js"></script>
  <script src="articles-app.js"></script>
  <script src="popup.js"></script>
</body>
</html>
