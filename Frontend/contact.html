<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - EEPL Classroom | Get In Touch</title>
  <meta name="description" content="Contact EEPL Classroom for queries, support, or to book a demo class. Reach us via email, phone, or WhatsApp.">
  <meta name="keywords" content="contact EEPL, support, email, phone, WhatsApp, Ranchi, counseling">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="contact.css">
</head>
<body>

  <!-- ===== STICKY HEADER ===== -->
  <header class="site-header" id="site-header">
    <div class="header-container">
      <a href="index.html" class="logo" id="header-logo">
        <img src="assets/eepl-reference-logo.png" alt="Emancipation Edutech Private Limited" class="header-logo-img">
      </a>
      <nav class="main-nav" id="main-nav">
        <ul class="nav-list" id="nav-list">
          <!-- Populated by JS -->
        </ul>
      </nav>
      <div class="header-actions" id="header-actions">
        <a href="/login" class="btn btn-outline-red" id="btn-login">Login</a>
        <a href="/register" class="btn btn-red" id="btn-register">Register</a>
      </div>
      <button class="hamburger" id="hamburger-btn" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
    </div>
    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobile-menu">
      <ul class="mobile-nav-list" id="mobile-nav-list"></ul>
      <div class="mobile-actions">
        <a href="/login" class="btn btn-outline-red">Login</a>
        <a href="/register" class="btn btn-red">Register</a>
      </div>
    </div>
  </header>

  <main>
    <!-- ===== HERO SECTION ===== -->
    <section class="contact-hero" id="contact-hero">
      <div class="contact-hero-container">
        <div class="contact-hero-content" id="contact-hero-content">
          <!-- Populated by JS -->
        </div>
        <div class="contact-hero-visual" id="contact-hero-visual">
          <!-- Populated by JS -->
        </div>
      </div>
    </section>

    <!-- ===== GET IN TOUCH & INQUIRY FORM ===== -->
    <section class="contact-section" id="contact-main">
      <div class="container">
        <div class="contact-grid">
          <!-- Left Column: Get In Touch -->
          <div class="contact-left" id="contact-left">
            <!-- Populated by JS -->
          </div>

          <!-- Right Column: Send an Inquiry -->
          <div class="contact-right" id="contact-right">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>

      <!-- Success Message (initially hidden) -->
      <div class="contact-success" id="contact-success" style="display: none;">
        <svg class="contact-success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <h3 class="contact-success-title">Thank you!</h3>
        <p class="contact-success-text">Our team will contact you shortly.</p>
      </div>
    </section>

    <!-- ===== BOTTOM CTA: GET CERTIFIED ===== -->
    <section class="contact-cta" id="contact-cta">
      <div class="contact-cta-container">
        <div class="contact-cta-content" id="contact-cta-content">
          <!-- Populated by JS -->
        </div>
        <div class="contact-cta-visual" id="contact-cta-visual">
          <!-- Populated by JS -->
        </div>
      </div>
    </section>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer" id="site-footer">
    <div class="container">
      <div class="footer-grid" id="footer-grid">
        <!-- Populated by JS -->
      </div>
      <div class="footer-bottom footer-bottom--visible">
        <p class="footer-copyright" id="footer-copyright"></p>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="data.js"></script>
  <script src="contact-data.js"></script>
  <script src="app.js"></script>
  <script src="contact-app.js"></script>
  <script src="popup.js"></script>

</body>
</html>
