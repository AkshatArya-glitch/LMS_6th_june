<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Gallery | EEPL Classroom</title>
  <meta name="description" content="Explore photos and media from EEPL Classroom.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="media-gallery.css">
</head>
<body class="media-gallery-page">
  <header class="site-header" id="site-header">
    <div class="header-container">
      <a href="index.html" class="logo" id="header-logo">
        <img src="assets/eepl-reference-logo.png" alt="Emancipation Edutech Private Limited" class="header-logo-img">
      </a>
      <nav class="main-nav" id="main-nav">
        <ul class="nav-list" id="nav-list"></ul>
      </nav>
      <div class="header-actions" id="header-actions">
        <a href="/login" class="btn btn-outline-red" id="btn-login">Login</a>
        <a href="/register" class="btn btn-red" id="btn-register">Register</a>
      </div>
      <button class="hamburger" id="hamburger-btn" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="mobile-menu" id="mobile-menu">
      <ul class="mobile-nav-list" id="mobile-nav-list"></ul>
      <div class="mobile-actions">
        <a href="/login" class="btn btn-outline-red">Login</a>
        <a href="/register" class="btn btn-red">Register</a>
      </div>
    </div>
  </header>

  <main>
    <section class="mg-hero">
      <div class="container">
        <h1>Media Gallery</h1>
        <p>Photos and media from EEPL Classroom events, courses, webinars, and campus activities.</p>
      </div>
    </section>

    <section class="section mg-section">
      <div class="container">
        <div class="mg-grid" id="media-gallery-grid">
          <div class="mg-empty">Loading media gallery...</div>
        </div>
      </div>
    </section>
  </main>

  <div class="mg-lightbox" id="mg-lightbox" hidden>
    <button class="mg-lightbox-close" type="button" aria-label="Close preview">&times;</button>
    <img id="mg-lightbox-img" src="" alt="">
    <video id="mg-lightbox-video" controls hidden></video>
    <p id="mg-lightbox-title"></p>
  </div>

  <footer class="site-footer" id="site-footer">
    <div class="footer-container">
      <div class="footer-grid" id="footer-grid"></div>
      <div class="footer-bottom">
        <p id="footer-copyright"></p>
      </div>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="media-gallery.js"></script>
  <script src="popup.js"></script>
</body>
</html>
